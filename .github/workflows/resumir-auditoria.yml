name: Resumir auditoria FY Beauty

on:
  push:
    branches:
      - audit/catalogos

permissions:
  contents: write

jobs:
  resumir:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: audit/catalogos
          fetch-depth: 0

      - name: Crear resumen compacto
        run: |
          if [ ! -f auditoria_catalogos.json ]; then
            exit 0
          fi
          python <<'PY'
          from pathlib import Path
          import json

          data = json.loads(Path('auditoria_catalogos.json').read_text(encoding='utf-8'))
          lines = []
          lines.append('=== CATALOGOS ===')
          for page, info in data['catalogos'].items():
              ids_ok = sum(1 for p in info['products'] if p['id'] is not None)
              smallest = '; '.join(
                  f"{p['image']}|{p['image_size']}|id={p['id']}|{p['name']}"
                  for p in info['three_smallest']
              )
              lines.append(
                  f"PAGE|{page}|cards={info['cards']}|images_ok={info['images_ok']}|all={info['all_images_ok']}|ids_ok={ids_ok}|total={info['total_image_bytes']}|smallest={smallest}"
              )

          lines.append('=== PAGINAS GENERALES ===')
          for page, info in data['paginas_generales'].items():
              lines.append(
                  f"GENERAL|{page}|cards={info['cards']}|buttons={len(info['buttons'])}|inputs={len(info['inputs'])}|selects={len(info['selects'])}|product_links={len(info['product_links'])}"
              )

          lines.append('=== PRODUCTOS ===')
          for p in data['productos']:
              d = p.get('data', {})
              lines.append(
                  'PRODUCT|{page}|id={id}|name={name}|price={price}|image={image}|exists={exists}|size={size}|tipo={tipo}|categoria={categoria}|marca={marca}|acabado={acabado}|tono={tono}|color={color}'.format(
                      page=p['page'], id=p['id'], name=p['name'], price=p['price'],
                      image=p['image'], exists=p['image_exists'], size=p['image_size'],
                      tipo=d.get('data-tipo', ''), categoria=d.get('data-categoria', ''),
                      marca=d.get('data-marca', ''), acabado=d.get('data-acabado', ''),
                      tono=d.get('data-tono', ''), color=d.get('data-color', '')
                  )
              )

          Path('auditoria_resumen.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Guardar resumen
        run: |
          if [ ! -f auditoria_resumen.txt ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auditoria_resumen.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Generar resumen temporal de auditoria"
          git push origin HEAD:audit/catalogos
