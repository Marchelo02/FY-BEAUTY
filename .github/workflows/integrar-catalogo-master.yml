name: Integrar catalogo final

on:
  push:
    branches:
      - fix/catalogo-js-master-run

permissions:
  contents: write

jobs:
  integrar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: fix/catalogo-js-master-run
          fetch-depth: 0

      - name: Ejecutar migracion temporal
        run: python integrar_catalogo.py

      - name: Guardar resultado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrar categorias en catalogo y aplicar filtros con boton"
          git push origin HEAD:fix/catalogo-js-master-run
