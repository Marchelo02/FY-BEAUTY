name: Auditar catalogos FY Beauty

on:
  push:
    branches:
      - audit/catalogos

permissions:
  contents: write

jobs:
  auditar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          ref: audit/catalogos
          fetch-depth: 0

      - name: Generar inventario
        run: |
          python <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import json
          import os
          import re

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.cards = []
                  self.stack = []
                  self.current_card = None
                  self.current_name = False
                  self.current_price = False
                  self.current_product_image = False
                  self.buttons = []
                  self.inputs = []
                  self.selects = []
                  self.current_select = None
                  self.links = []

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  classes = set(attrs.get('class', '').split())
                  self.stack.append((tag, classes))

                  if tag == 'div' and 'card-producto' in classes:
                      self.current_card = {
                          'data': {k: v for k, v in attrs.items() if k.startswith('data-')},
                          'name': '', 'price': '', 'image': '', 'href': ''
                      }

                  if self.current_card is not None:
                      if tag == 'div' and 'producto-imagen' in classes:
                          self.current_product_image = True
                      if tag == 'img' and self.current_product_image:
                          self.current_card['image'] = attrs.get('src', '')
                      if tag == 'a' and attrs.get('href', '').startswith('producto.html?id='):
                          self.current_card['href'] = attrs.get('href', '')
                      if tag == 'p' and 'nombre-producto' in classes:
                          self.current_name = True
                      if tag == 'p' and 'precio-producto' in classes:
                          self.current_price = True

                  if tag == 'button':
                      self.buttons.append({'class': attrs.get('class', ''), 'type': attrs.get('type', '')})
                  if tag == 'input':
                      self.inputs.append({'id': attrs.get('id', ''), 'type': attrs.get('type', ''), 'class': attrs.get('class', '')})
                  if tag == 'select':
                      self.current_select = {'id': attrs.get('id', ''), 'class': attrs.get('class', ''), 'data': {k:v for k,v in attrs.items() if k.startswith('data-')}}
                      self.selects.append(self.current_select)
                  if tag == 'a':
                      self.links.append(attrs.get('href', ''))

              def handle_endtag(self, tag):
                  if self.current_card is not None:
                      if tag == 'p' and self.current_name:
                          self.current_name = False
                      if tag == 'p' and self.current_price:
                          self.current_price = False
                      if tag == 'div' and self.current_product_image:
                          self.current_product_image = False
                      if tag == 'div' and self.stack and 'card-producto' in self.stack[-1][1]:
                          self.cards.append(self.current_card)
                          self.current_card = None
                  if self.stack:
                      self.stack.pop()

              def handle_data(self, data):
                  if self.current_card is not None:
                      if self.current_name:
                          self.current_card['name'] += ' ' + data.strip()
                      if self.current_price:
                          self.current_card['price'] += ' ' + data.strip()

          def parse(path):
              parser = Parser()
              parser.feed(path.read_text(encoding='utf-8'))
              return parser

          root = Path('.')
          report = {'catalogos': {}, 'paginas_generales': {}, 'productos': [], 'imagenes_referenciadas': {}}

          for path in sorted(root.glob('*.html')):
              parser = parse(path)
              if parser.cards:
                  info = []
                  for card in parser.cards:
                      img = card['image'].strip()
                      img_path = root / img if img else None
                      exists = bool(img and img_path.exists() and img_path.is_file())
                      size = img_path.stat().st_size if exists else None
                      product_id = None
                      match = re.search(r'id=(\d+)', card['href'])
                      if match:
                          product_id = int(match.group(1))
                      item = {
                          'id': product_id,
                          'name': ' '.join(card['name'].split()),
                          'price': ' '.join(card['price'].split()),
                          'image': img,
                          'image_exists': exists,
                          'image_size': size,
                          'data': card['data']
                      }
                      info.append(item)
                      report['productos'].append({'page': path.name, **item})
                      if img:
                          report['imagenes_referenciadas'].setdefault(img, []).append(path.name)

                  valid = [x for x in info if x['image_exists']]
                  report['catalogos'][path.name] = {
                      'cards': len(info),
                      'images_ok': len(valid),
                      'all_images_ok': len(valid) == len(info),
                      'total_image_bytes': sum(x['image_size'] or 0 for x in info),
                      'products': info,
                      'three_smallest': sorted(valid, key=lambda x: x['image_size'])[:3]
                  }

              if path.name in {'maquillaje.html', 'maquillaje-rostro.html', 'maquillaje-ojos.html', 'maquillaje-labios.html'}:
                  report['paginas_generales'][path.name] = {
                      'cards': len(parser.cards),
                      'buttons': parser.buttons,
                      'inputs': parser.inputs,
                      'selects': parser.selects,
                      'product_links': [x for x in parser.links if x.startswith('producto.html?id=')]
                  }

          image_files = []
          img_dir = root / 'img'
          if img_dir.exists():
              for path in img_dir.rglob('*'):
                  if path.is_file():
                      image_files.append({'path': path.as_posix(), 'size': path.stat().st_size})
          report['image_files'] = sorted(image_files, key=lambda x: x['size'])

          Path('auditoria_catalogos.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          PY

      - name: Guardar inventario
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add auditoria_catalogos.json
          git commit -m "Generar auditoria temporal de catalogos"
          git push origin HEAD:audit/catalogos
